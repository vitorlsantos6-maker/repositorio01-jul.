<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual</title>

    <!--Faz seu camentario -->
    <!--LINK PARA ADICIONAR O FAVICON-->

    <link rel="shortcut icon" href="imagens/icones/favicon.ico" type="image/x-icon">

    <!--LINK PARA O ARQUIVO-->
    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
    <link rel="stylesheet" href="../css/style_formulario.css">
</head>

<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="index.html">
                    <img src="imagens/icones/logo.png" alt="logo">

                    </img>
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="index.html" class="link_menu"> Home </a></li>
                    <li><a href="paginas/cardastro.html" class="link_menu"> Cadastro </a></li>
                    <li><a href="paginas/sobre.html" class="link_menu"> Sobre </a></li>

                </ul>
            </nav>
            <div id="div-icones">
                <ul>
                    <li><a href="/paginas/login.html" class="lnk_icone"><img src="imagens/icones/login.png" alt=""></a>
                    </li>
                    <li><a href="/paginas/carrinho.html" class="lnk_icone"><img src="imagens/icones/carrinho.png"
                                alt=""></a></li>
                </ul>
            </div>
        </header>

        <section id="pesquisa">
            <input type="text" name="pesquisa" id="pesquisa" placeholder="Digite seu produto">
        </section>

        <section id="formulario">
            <h3>Cadastro</h3>
        

        <form id="pessoa">
            <label for="nome">Nome</label>
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" class="input01" required maxlength="60"
                placeholder="Digite seu Nome">

            <label for="nome">CPF</label>
            <input type="nome" class="input01" required maxlength="60" placeholder="Digite seu nome">

            <label for="data-nascimento">Data Nascimento</label>
            <input type="date" name="data-nascimento" id="data-nascimento" class="input02" required>

            <label for="sexo">Sexo</label>
            <input type="radio" name="sexo" id="sexoM" class="inputOP" value="M"> Masculino
            <input type="radio" name="sexo" id="sexoM" class="inputOP" value="M"> Feminino
            <input type="radio" name="sexo" id="sexoM" class="inputOP" value="M"> Não quero Declarar

            <label for="cep">CEP</label>
            <input type="text" name="cep" id="cep" class="input02" required maxlength="9" placeholder="Digite seu CEP">

            <div id="div-dados-endereço" class="oculto">
                <label for="lagradouro">lagradouro</label>
                <input type="text" name="logradouro" id="logradouro" class="input01">

                <label for="num-residencia">Número</label>
                <input type="text" name="logradouro" id="logradouro" class="input01" maxlength="10"
                    placeholder="Digite o número da residencia">

                <label for="complemento-end">complemento</label>
                <input type="text" name="complemento-end" id="complemento" class="input01" maxlength="100"
                    placeholder="Digite o Número da residencia">

                <label for="bairro">Bairro</label>
                <input type="text" name="bairro" id="bairro" class="input01">

                <label for="localidade">Localidade</label>
                <input type="text" name="localidade" id="localidade" class="input01">

                <label for="uf">UF</label>
                <input type="text" name="uf" id="uf" class="input02">

            </div>

            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" class="input02" required maxlength="6"
                placeholder="Informe a senha">

            <div id="div-btns">
                <button type="submit" id="btn-add">Cadastro</button>
                <button type="reset" id="btn-limpar">Limpar</button>
            </div>
        </form>
        </section>

        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua sei la das quantas, 1001 - centro</h2>
                <h1>Aracaju - Sergipe</h1>
            </div>

            <div id="icones_sociais">
                <ul>
                    <li><a href="https://www.instagram.com/seu_usuario"><img src="imagens/icones/instagram.png"
                                alt=""></a></li>
                    <li><a href="https://www.facebook.com/seu_usuario"><img src="images/icones/instagram.png"
                                alt=""></a></li>
                    <li><a href="https://www.faceboock.com/seu_usuario"><img src="imagens/icones/x.png" alt=""></a></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="imagens/icones/hipercard.png" alt="hipercard">
                <img src="imagens/icones/visa.png" alt="Visa">
                <img src="imagens/icones/master_card.png" alt="Matercard">
            </div>
        </footer>
    </main>
</body>

</html>
